<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{"/assets/vendor/startbootstrap-clean-blog/js/scripts.js" | relative_url }}"></script>

<script src="{{"/assets/scripts.js" | relative_url }}"></script>

<script>
  (function () {
    // Announce new-tab behavior for assistive tech users.
    var newTabLinks = document.querySelectorAll('a[target="_blank"]');
    newTabLinks.forEach(function (link) {
      if (link.getAttribute('data-new-tab-annotated') === 'true') {
        return;
      }

      var note = document.createElement('span');
      note.className = 'sr-only';
      note.textContent = ' (opens in a new tab)';
      link.appendChild(note);
      link.setAttribute('data-new-tab-annotated', 'true');
    });
  })();
</script>

{% if page.form %}
  <!-- Form Validation -->
  <script src="{{"/assets/vendor/startbootstrap-clean-blog/js/jqBootstrapValidation.js" | relative_url }}"></script>
  <!-- Send Form -->
  <script>
    $(function () {
      var $errorBox = $('#form-errors');
      var $errorList = $('#form-errors-list');

      function renderValidationSummary() {
        var errors = [];

        $('#contactForm input, #contactForm textarea').each(function () {
          if (this.checkValidity && !this.checkValidity()) {
            var label = $('label[for="' + this.id + '"]').text().trim() || this.id;
            var message = this.validationMessage || 'This field is required.';
            errors.push(label + ': ' + message);
          }
        });

        if (errors.length > 0) {
          $errorList.empty();
          errors.forEach(function (err) {
            $('<li>').text(err).appendTo($errorList);
          });
          $errorBox.removeClass('d-none');
          $errorBox.focus();
        } else {
          $errorList.empty();
          $errorBox.addClass('d-none');
        }
      }

      $("#contactForm input,#contactForm textarea").jqBootstrapValidation({
        preventSubmit: true,
        submitError: function ($form, event, errors) {
          renderValidationSummary();
        },
        submitSuccess: function ($form, event) {
          event.preventDefault(); // prevent default submit behaviour
          $errorList.empty();
          $errorBox.addClass('d-none');
          // get values from FORM
          var name = $("input#name").val();
          var email = $("input#email").val();
          var phone = $("input#phone").val();
          var message = $("textarea#message").val();
          var firstName = name; // For Success/Failure Message
          // Check for white space in name for Success/Fail message
          if (firstName.indexOf(' ') >= 0) {
            firstName = name.split(' ').slice(0, -1).join(' ');
          }
          $this = $("#sendMessageButton");
          $this.prop("disabled", true); // Disable submit button until AJAX call is complete to prevent duplicate messages
          $.ajax({
            url: "//formspree.io/{{ site.email }}",
            type: "POST",
            data: {
              name: name,
              phone: phone,
              email: email,
              message: message
            },
            cache: false,
            success: function () {
              // Success message
              $('#success').html("<div class='alert alert-success'>");
              $('#success > .alert-success').html("<button type='button' class='close' data-dismiss='alert' aria-label='Close'><span aria-hidden='true'>&times;</span>").append("</button>");
              $('#success > .alert-success').append("<strong>Your message has been sent. </strong>");
              $('#success > .alert-success').append('</div>');
              //clear all fields
              $('#contactForm').trigger("reset");
            },
            error: function () {
              // Fail message
              $('#success').html("<div class='alert alert-danger'>");
              $('#success > .alert-danger').html("<button type='button' class='close' data-dismiss='alert' aria-label='Close'><span aria-hidden='true'>&times;</span>").append("</button>");
              $('#success > .alert-danger').append($("<strong>").text("Sorry " + firstName + ", it seems that my mail server is not responding. Please try again later!"));
              $('#success > .alert-danger').append('</div>');
              //clear all fields
              $('#contactForm').trigger("reset");
            },
            complete: function () {
              setTimeout(function () {
                $this.prop("disabled", false); // Re-enable submit button when AJAX call is complete
              }, 1000);
            }
          });
        },
        filter: function () {
          return $(this).is(":visible");
        }
      });

      $('#contactForm').on('submit', function () {
        setTimeout(renderValidationSummary, 0);
      });

      $('#contactForm input, #contactForm textarea').on('input change', function () {
        if (!$errorBox.hasClass('d-none')) {
          setTimeout(renderValidationSummary, 0);
        }
      });

      $("a[data-toggle=\"tab\"]").click(function (e) {
        e.preventDefault();
        $(this).tab("show");
      });
    });

    /*When clicking on Full hide fail/success boxes */
    $('#name').focus(function () {
      $('#success').html('');
    });
  </script>
{% endif %}
